versions:
  - version: 0.2.8
    date: 2026-03-01
    changes:
      - type: added
        items:
          - Tooltips on key action buttons across campaign, editor, sender, SMTP, and list flows to improve affordance and discoverability
          - Shared `content-area` layout utility class to standardize section spacing and structure

      - type: changed
        items:
          - Refined empty-state presentation in Send Campaign, Sender, and SMTP Config sections for a clearer first-run experience
          - Reworked Backup and Email List sections to adopt the new layout and alert composition patterns
          - Reorganized AppShell navigation by grouping related destinations for faster scanning

  - version: 0.2.7
    date: 2026-02-26
    changes:
      - type: added
        items:
          - Route-based dashboard sections (`/smtp`, `/senders`, `/lists`, `/editor`, `/send`, `/backup`) with root redirect from `/` to `/smtp`
          - Shared campaign repository helpers for send data loading, unique recipient counting, and send log retrieval
          - SMTP route contract tests for `/api/smtp/send` and `/api/smtp/test`
          - Backup format v2 with metadata (`appVersion`, `dbSchemaVersion`) and legacy v1 import normalization

      - type: changed
        items:
          - Refactored sidebar shell navigation to be pathname-aware and deep-link compatible
          - Replaced destructive `window.confirm` prompts with accessible alert dialogs in sender/list/contact/campaign flows
          - Standardized SMTP API envelopes to `{ success, code, message, retryable, details? }` across `test`, `send`, and `send-batch`
          - Upgraded batch sending internals to worker-pool style processing and hardened merge-field replacement by escaping custom field regex keys
          - Updated IndexedDB schema to v5 with contact email normalization and sender unsubscribe fallback migration
          - Consolidated duplicated UI hook entry points by re-exporting shared `use-mobile` and `use-toast` implementations
          - Introduced shared UI/IX utility classes (`section-header`, `section-title`, `section-description`, `action-cluster`, `status-panel`)

      - type: fixed
        items:
          - Fixed merge field replacement edge cases for custom keys containing regex-special characters
          - Fixed inconsistent SMTP error messaging in UI by handling both `message` and legacy `error` response fields

  - version: 0.2.6
    date: 2026-02-26
    changes:
      - type: added
        items:
          - In-app changelog modal accessible from the sidebar, showing full version history with categorized release notes
          - Changelog API route serving structured data from `changelog.yaml`
          - Dynamic favicon with Bismuth brand gradient generated via `next/og`

      - type: changed
        items:
          - Migrated changelog from Markdown to structured YAML format for programmatic access

  - version: 0.2.5
    date: 2026-02-26
    changes:
      - type: added
        items:
          - Contact List cleanup action to remove invalid emails and deduplicate entries directly from the list view
          - Visual validation summary cards in the contacts view showing latest cleanup and import validation outcomes with grouped counters

      - type: changed
        items:
          - CSV import for newsletter contacts now validates emails client-side, normalizes addresses, and rejects invalid rows before insertion
          - CSV import now detects duplicates inside the uploaded file and reports them separately from already-existing contacts in the target list
          - Import and cleanup feedback now provides detailed counts for imported, skipped, invalid-format, duplicate, and existing-contact records

      - type: fixed
        items:
          - Contact deduplication now uses normalized case-insensitive email matching to avoid duplicate records with different capitalization
          - Manual contact addition now validates email format and normalizes email addresses

  - version: 0.2.4
    date: 2026-02-24
    changes:
      - type: added
        items:
          - Added global App Router error boundaries via `app/error.tsx` and `app/global-error.tsx` with recovery actions
          - Added `send-batch` API route tests covering invalid payloads, merge field/HTML escaping behavior, and transient retry handling
          - Added reusable `useDbTable` hook for consistent Dexie table loading state (`data`, `loading`, `error`, `reload`)

      - type: changed
        items:
          - Refactored `smtp-config` to use the shared `useDbTable` loading pattern
          - Updated README with explicit CI scope (CI checks in repo, no CD workflow defined)
          - Added README security guidance for self-hosted SMTP credential handling
          - Aligned README TypeScript references to 5.9

  - version: 0.2.3
    date: 2026-02-24
    changes:
      - type: changed
        items:
          - Performed a structured dependency refresh across runtime and tooling packages, including `zod` v4, `sonner` v2, `tailwindcss` v4.2, `typescript` v5.9, and related type packages
          - Updated `nodemailer` to `8.0.1` explicitly in dependencies and removed now-redundant `nodemailer` overrides
          - Kept `eslint` on v9 intentionally due to current `eslint-config-next` plugin incompatibility with v10 in this project

  - version: 0.2.2
    date: 2026-02-23
    changes:
      - type: changed
        items:
          - Simplified email footer to show only the unsubscribe link, removing the redundant "subscribed to our mailing list" message

  - version: 0.2.1
    date: 2026-02-23
    changes:
      - type: changed
        items:
          - Added dependency overrides for minimatch, nodemailer, and ajv to enforce secure minimum versions
          - Updated nodemailer to 8.0.1 and ajv to 8.18.0
          - "Added explicit `permissions: { contents: read }` to CI workflow to follow the principle of least privilege"

  - version: 0.2.0
    date: 2025-02-22
    changes:
      - type: added
        items:
          - "**Sending context** — new `SendingProvider` that tracks sending state (phase, progress, errors) across the entire app"
          - "**Live progress indicator** — sidebar shows real-time sending progress with phase labels, progress bar, and failure count"
          - "**Retry mechanism** — automatic retries with detailed error diagnostics when individual emails fail"
          - "**Custom merge fields** — support `{{field}}` placeholders in subject and body, resolved per-contact from list custom fields"
          - "**SMTP tuning options** — configurable `delayMs`, `batchSize`, and `maxConnections` per SMTP server"
          - "**Test email** — send a single test email before launching a full campaign"

      - type: changed
        items:
          - Refactored send-batch API to accept structured contacts with custom fields instead of plain recipient strings
          - Reduced default batch size cap from 100 to 50 for more reliable delivery
          - Set default inter-batch delay to 200 ms to avoid SMTP throttling
          - Batch size is now computed automatically based on SMTP config; removed manual input from the UI
          - Updated database schema with backward-compatible migrations for new SMTP fields

      - type: fixed
        items:
          - Select component items now truncate long text instead of overflowing

  - version: 0.1.0
    date: 2025-02-15
    changes:
      - type: added
        items:
          - SMTP server configuration with connection testing
          - Sender profiles with custom signatures and reply-to addresses
          - Email list management with custom fields, CSV import/export
          - Block-based email editor (text, image, button, divider, raw HTML)
          - Campaign sending with per-recipient delivery logging
          - Full data backup and restore as JSON
          - Dark mode with system-aware theme toggle
          - Fully local storage via IndexedDB (Dexie) — no server-side database
